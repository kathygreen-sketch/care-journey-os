name: Supabase Keepalive

on:
  schedule:
    # Runs every day at 10:00 UTC — well within Supabase's 7-day inactivity window
    - cron: "0 10 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/cases?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase response: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "Keepalive succeeded."
          else
            echo "Keepalive returned status $response — check Supabase project status."
            exit 1
          fi
